<script type="module">
	import { animate, stagger } from "https://cdn.jsdelivr.net/npm/motion@latest/+esm";

	const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
	const root = document.documentElement;
	let cleanupTimer;
	root.dataset.motion = prefersReducedMotion ? "reduced" : "ready";

	const finishLoading = () => {
		root.classList.remove("motion-loading");
		if (cleanupTimer) {
			window.clearTimeout(cleanupTimer);
		}
	};

	if (!prefersReducedMotion) {
		const ease = [0.22, 1, 0.36, 1];
		const animations = [];
		const animateIfPresent = (selector, keyframes, options) => {
			const elements = document.querySelectorAll(selector);

			if (elements.length > 0) {
				animations.push(animate(elements, keyframes, options));
			}
		};

		const isMobile = window.matchMedia("(max-width: 992px)").matches;

		if (isMobile) {
			animateIfPresent(".iphonePreview > :not(.phoneAppIconShadow)", { opacity: 1, y: 0 }, { duration: 0.58, delay: 0.08, ease });
			animateIfPresent(".phoneAppIconShadow", { opacity: 1, y: 0, scale: 1 }, { duration: 0.5, delay: 0.2, ease });
		} else {
			animateIfPresent(".iphonePreview", { opacity: 1, y: 0 }, { duration: 0.58, delay: 0.08, ease });
		}

		animateIfPresent(".appInfo > *", { opacity: 1, y: 0 }, { duration: 0.5, delay: stagger(0.06, { startDelay: 0.12 }), ease });
		animateIfPresent(".feature", { opacity: 1, y: 0 }, { duration: 0.52, delay: stagger(0.045, { startDelay: 0.22 }), ease });
		animateIfPresent(".markdown-body > *", { opacity: 1, y: 0 }, { duration: 0.42, delay: stagger(0.035, { startDelay: 0.08 }), ease });

		window.requestAnimationFrame(() => {
			finishLoading();
		});

		cleanupTimer = window.setTimeout(() => {
			finishLoading();
		}, 1200);

		Promise.allSettled(animations).then(finishLoading);
	} else {
		finishLoading();
	}
</script>
