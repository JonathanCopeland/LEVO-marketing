# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Playing, Up next, Finished
    description                           : Keep the games you're playing, saving for later, and already finished in one library.
    feather_icon_name                     : play-circle

  - title                                 : Plan your next play
    description                           : Choose what you want to play next and keep it easy to find in Up next.
    feather_icon_name                     : bookmark

  - title                                 : See your finish timeline
    description                           : Scroll through finished games by month and see how your playing changes over time.
    feather_icon_name                     : bar-chart-2

  - title                                 : Organize your library visually
    description                           : Sort covers by color when you want your library to feel easier to browse.
    feather_icon_name                     : droplet

  - title                                 : Share your year in games
    description                           : Export a clean image that shows the games you finished this year.
    feather_icon_name                     : image

  - title                                 : Home screen widgets
    description                           : Keep Up next on your home screen, or pin one featured game.
    feather_icon_name                     : layout



