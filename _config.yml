# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Reading, Up next, Finished
    description                           : Keep the books you're reading, saving for later, and already finished in one library.
    feather_icon_name                     : book-open

  - title                                 : Plan your next read
    description                           : Choose what you want to read next and keep it easy to find in Up next.
    feather_icon_name                     : bookmark

  - title                                 : See your reading habits
    description                           : Scroll through finished books by month and see how your reading changes over time.
    feather_icon_name                     : bar-chart-2

  - title                                 : Organize your library visually
    description                           : Sort covers by color when you want your library to feel easier to browse.
    feather_icon_name                     : droplet

  - title                                 : Share your year in books
    description                           : Export a clean image that shows the books you finished this year.
    feather_icon_name                     : image

  - title                                 : Home screen widgets
    description                           : Keep Up next on your home screen, or pin one featured book.
    feather_icon_name                     : layout



